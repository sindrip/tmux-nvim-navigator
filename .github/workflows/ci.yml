name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        tmux-version: ['3.0', '3.1', '3.6a']
        neovim-version: ['v0.8.0', 'v0.9.0', 'v0.10.0', 'stable']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Resolve nixpkgs revisions
        id: nixpkgs
        run: |
          case "${{ matrix.tmux-version }}" in
            3.0)
              echo "tmux=ee355d50a38e489e722fcbc7a7e6e45f7c74ce95"
              echo "tmux-legacy=true"
              ;;
            3.1)
              echo "tmux=4426104c8c900fbe048c33a0e6f68a006235ac50"
              echo "tmux-legacy=true"
              ;;
            3.6a)
              echo "tmux=nixpkgs-unstable"
              echo "tmux-legacy=false"
              ;;
          esac >> "$GITHUB_OUTPUT"

          case "${{ matrix.neovim-version }}" in
            v0.8.0)  echo "nvim=b3a285628a6928f62cdf4d09f4e656f7ecbbcafb" ;;
            v0.9.0)  echo "nvim=8cad3dbe48029cb9def5cdb2409a6c80d3acfe2e" ;;
            v0.10.0) echo "nvim=05bbf675397d5366259409139039af8077d695ce" ;;
            stable)  echo "nvim=nixpkgs-unstable" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Install tmux ${{ matrix.tmux-version }}
        run: |
          ARGS=""
          if [ "$RUNNER_OS" = "macOS" ] && [ "${{ steps.nixpkgs.outputs.tmux-legacy }}" = "true" ]; then
            ARGS="--argstr system x86_64-darwin"
          fi
          nix-env -f "https://github.com/NixOS/nixpkgs/archive/${{ steps.nixpkgs.outputs.tmux }}.tar.gz" $ARGS -iA tmux

      - name: Install neovim ${{ matrix.neovim-version }}
        run: nix-env -f "https://github.com/NixOS/nixpkgs/archive/${{ steps.nixpkgs.outputs.nvim }}.tar.gz" -iA neovim

      - name: Install bats
        run: nix-env -f "https://github.com/NixOS/nixpkgs/archive/nixpkgs-unstable.tar.gz" -iA bats

      - name: Link binaries into standard PATH
        run: |
          sudo ln -sf "$(which tmux)" /usr/local/bin/tmux
          sudo ln -sf "$(which nvim)" /usr/local/bin/nvim

      - name: Run tests
        run: |
          tmux -V
          nvim --version | head -1
          bats tests/
