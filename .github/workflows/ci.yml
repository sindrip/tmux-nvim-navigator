name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        tmux-version: ["3.0a", "3.6a"]
        neovim-version:
          - "v0.8.3"
          - "v0.9.5"
          - "v0.10.4"
          - "v0.11.0"
          - "stable"
          - "nightly"

    steps:
      - uses: actions/checkout@v4

      # --- tmux ---
      - name: Install tmux 3.0a (focal .deb)
        if: matrix.tmux-version == '3.0a'
        run: |
          wget -q http://archive.ubuntu.com/ubuntu/pool/main/t/tmux/tmux_3.0a-2ubuntu0.4_amd64.deb
          sudo apt-get install -y ./tmux_3.0a-2ubuntu0.4_amd64.deb

      - name: Install tmux 3.6a (static binary)
        if: matrix.tmux-version == '3.6a'
        run: |
          curl -sL https://github.com/tmux/tmux-builds/releases/download/v3.6a/tmux-3.6a-linux-x86_64.tar.gz \
            | sudo tar xz -C /usr/local/bin --strip-components=1

      - name: Verify tmux
        run: tmux -V

      # --- neovim ---
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Verify neovim
        run: nvim --version | head -1

      # --- bats ---
      - name: Setup bats
        id: setup-bats
        uses: bats-core/bats-action@4.0.0

      # --- tests ---
      - name: Run tests
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm-256color
        run: bats tests/

  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26]
        neovim-version: ["stable"]
        include:
          - os: ubuntu-latest
            neovim-version: nightly

    steps:
      - uses: actions/checkout@v4

      # --- tmux ---
      - name: Install tmux (Linux — static binary)
        if: runner.os == 'Linux'
        run: |
          curl -sL https://github.com/tmux/tmux-builds/releases/download/v3.6a/tmux-3.6a-linux-x86_64.tar.gz \
            | sudo tar xz -C /usr/local/bin --strip-components=1

      - name: Install tmux (macOS — Homebrew)
        if: runner.os == 'macOS'
        run: brew install tmux

      # --- neovim ---
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Verify versions
        run: |
          tmux -V
          nvim --version | head -1

      # --- bats ---
      - name: Setup bats
        id: setup-bats
        uses: bats-core/bats-action@4.0.0

      # --- tests ---
      - name: Run tests
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm-256color
        run: bats tests/
